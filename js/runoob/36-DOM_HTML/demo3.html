<!--
  ============================================================
  【第 36 节 · DOM HTML】demo3.html
  ============================================================

  【知识点 / 后端类比】
  用 JS 改 HTML 内容：innerHTML、textContent、getElementById 等。
  后端类比：≈ 在服务端修改模板变量，但这里是【运行时改浏览器里的 DOM 节点】。

  【运行方式】浏览器打开本文件即可。
-->
<!DOCTYPE html><html>
<body>
<h1 id="header">Old Header</h1>
<script>
    var element=document.getElementById("header");element.innerHTML="新标题";  // 按 id 查找 DOM 元素（id≈主键），返回该节点
</script>
</body>
</html>
