  Prototype 库：早期框架，扩展原生对象。已过时，了解即可。

  【运行方式】浏览器打开本文件即可。
-->
<!DOCTYPE html>
<html>
<script src="https://cdn.staticfile.org/prototype/1.7.3/prototype.min.js">
</script>
<script>
    function myFunction()  // 函数声明（会提升 hoisting）
{
    $("h01").writeAttribute("style","color:red").insert("Hello Prototype!");  // jQuery 选择器/调用（$ 是 jQuery 的入口函数）
}
Event.observe(window,"load",myFunction);
</script>
</head>
<body>
<h1 id="h01"></h1>
</body>
</html>
