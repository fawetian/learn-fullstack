<!--
  ============================================================
  【第 26 节 · JavaScript this】demo7.html
  ============================================================

  【知识点 / 后端类比】
  JS 最难概念之一！this 指向【调用函数的对象】，随调用方式变化(4种绑定)。
  后端类比(重要差异)：Java 的 this 永远指向当前实例；JS 的 this 看【谁调用】它——
  默认绑定(普通调用→window)、隐式绑定(对象方法→该对象)、显式绑定(call/apply)、new 绑定(构造函数→新对象)。

  【运行方式】浏览器打开本文件即可。
-->
<button onclick="this.style.display='none'">
点我后我就消失了
</button>
