<!DOCTYPE html>
<!--
  ============================================================
  【第 03 节 · JavaScript 用法】demo5：引入外部 JS 文件
  ============================================================

  【核心知识点】
  1) <script src="myScript.js"></script>
       —— 不写内部代码，而是用 src 指向一个【外部 .js 文件】。
       浏览器会去下载并执行该文件里的代码。

  2) 为什么用外部文件？（后端视角很好理解）
       - 【关注点分离】HTML 管结构、JS 管行为，和后端把模板与业务逻辑分离一个道理。
       - 【复用】同一个 .js 可被多个 HTML 页面引用（类似公共库 / 共享模块）。
       - 【缓存】浏览器会缓存 .js 文件，下次访问其他页面时不用重新下载。
       - 【可维护】单独的 .js 文件可被 IDE 检查、压缩、做单元测试。

  3) 配套文件：同目录下的 demo6.js 就是这个 myScript.js 的实际内容。
     你可以把本 demo 里的 src 改成 "demo6.js" 来真实运行。

  【注意】
    - 外部 .js 文件里【不能】再写 <script> 标签（那是 HTML 语法，不是 JS 语法）。
    - 后端类比：就像你在一个 .go/.java 源文件里不会再写 import 语法包一层壳。

  【运行方式】把本文件和 demo6.js 放同目录，浏览器打开本文件即可。
-->
<html>
<body>
<!-- 引入外部 JS：src 指向相对路径下的 myScript.js（本目录即 demo6.js） -->
<script src="myScript.js"></script>
</body>
</html>
