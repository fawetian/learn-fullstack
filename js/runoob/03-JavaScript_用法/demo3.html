<!DOCTYPE html>
<!--
  ============================================================
  【第 03 节 · JavaScript 用法】demo3：<head> 中定义函数 + 事件触发
  ============================================================

  【核心知识点】这是前端最经典的“交互范式”，务必理解：

  ┌─ 定义阶段（<head> 里）─────────────────────────────┐
  │  把函数定义放在 <head>，页面加载时就【注册好】，       │
  │  但【不会立即执行】——只有被调用时才跑。               │
  │  后端类比：相当于在启动时声明好一个 handler/路由处理函数。│
  └──────────────────────────────────────────────────┘

  ┌─ 触发阶段（<body> 里）─────────────────────────────┐
  │  <button onclick="myFunction()">：                   │
  │  onclick 是【事件属性】，用户点击按钮时，浏览器会       │
  │  【自动调用】 myFunction()。                          │
  │  后端类比：onclick 类似给路由注册的回调；点击=收到请求。 │
  └──────────────────────────────────────────────────┘

  【三个关键 API / 概念】
  1) document.getElementById("demo")
       —— 按 id 在 DOM 树里【查找元素】，返回该 DOM 节点。
       后端类比：类似按主键查一条记录，这里 id="demo" 就是“主键”。

  2) .innerHTML = "..."
       —— 设置该元素【内部的 HTML 内容】（会重新渲染子节点）。
       类似 Java 里 obj.setField(...)，但改的是【页面显示的内容】。

  3) function myFunction() {...}
       —— JS 函数声明（Function Declaration）。
       特点：会【声明提升 hoisting】，所以放在 <head> 里、
       在按钮点击时一定能找到它。

  【运行方式】浏览器打开本文件 → 点“尝试一下”按钮 → 段落文字被替换。
-->
<html>
<head>
<script>
// 在 <head> 中定义函数：页面加载时注册，但不执行
function myFunction()
{
    // 找到 id="demo" 的元素，把它的内容改成新文字
    document.getElementById("demo").innerHTML="我的第一个 JavaScript 函数";
}
</script>
</head>
<body>
<h1>我的 Web 页面</h1>
<p id="demo">一个段落</p>
<!-- onclick：点击事件。点击时调用上面定义的 myFunction -->
<button type="button" onclick="myFunction()">尝试一下</button>
</body>
</html>
