<!DOCTYPE html>
<!--
  ============================================================
  【第 03 节 · JavaScript 用法】demo2：<body> 中的 JavaScript（页面加载时直接执行）
  ============================================================

  【核心知识点】
  1) 把 <script> 放在 <body> 里，里面的 JS 会在【页面加载到这里时立刻执行】。
     - 后端类比：就像服务端模板渲染时，按顺序“边渲染边执行”这段逻辑。

  2) document.write() ：直接把字符串【写进 HTML 文档流】。
     - 它会【覆盖整个页面】（如果在页面已加载完后调用）。
     - 实际开发几乎不用，仅用于教学演示（会破坏已有 DOM 结构）。

  3) document 对象：代表【整个网页】（DOM 树的根）。
     - 后端类比：可看作浏览器提供给 JS 的“全局运行时上下文”，
       类似服务端的 app / ctx，是访问页面一切的入口。

  4) 下面 HTML 里的 "." 是 runoob 用来【省略无关内容】的占位符（表示这里还有别的东西），
     不是有效 HTML，真实页面里应替换成实际内容。

  【运行方式】把本文件存为 .html，用浏览器打开。
-->
<html>
<body>
.
.
<script>
// document.write 把参数字符串直接插入到 <script> 当前位置
document.write("<h1>这是一个标题</h1>");   // 渲染出一个一级标题
document.write("<p>这是一个段落</p>");      // 渲染出一个段落
</script>
.
.
</body>
</html>
