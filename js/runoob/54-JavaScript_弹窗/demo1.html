<!--
  ============================================================
  【第 54 节 · JavaScript 弹窗】demo1.html
  ============================================================

  【知识点 / 后端类比】
  三种弹窗：alert(提示)、confirm(确认返回布尔)、prompt(输入返回字符串)。都阻塞。
  后端类比：浏览器原生的“模态对话框”，正式项目多用自定义 UI 替代。

  【运行方式】浏览器打开本文件即可。
-->
<!DOCTYPE html><html>
<head>
<script>
    function myFunction()  // 函数声明（会提升 hoisting）
{
    alert("你好，我是一个警告框！");  // 浏览器弹窗（模态、阻塞），调试用，正式项目少用
}
</script>
</head>
<body>
<input type="button" onclick="myFunction()" value="显示警告框">
</body>
</html>
