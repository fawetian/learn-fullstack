<!--
  ============================================================
  【第 37 节 · DOM CSS】demo2.html
  ============================================================

  【知识点 / 后端类比】
  用 element.style.属性 改样式。className/classList 改类名。
  后端类比：操作元素的“表现层属性”，类似改配置项触发重新渲染。

  【运行方式】浏览器打开本文件即可。
-->
<!DOCTYPE html><html><body><h1 id="id1">我的标题 1</h1>
	<button type="button" onclick="document.getElementById('id1').style.color='red'">
	点我!</button></body></html>
