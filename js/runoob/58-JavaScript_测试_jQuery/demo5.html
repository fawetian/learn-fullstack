<!--
  ============================================================
  【第 58 节 · JavaScript 测试 jQuery】demo5.html
  ============================================================

  【知识点 / 后端类比】
  jQuery：$ 选择器 + 链式操作，曾最流行。$(fn)、$.get、$(selector).html()。
  后端类比：$ ≈ 通用的“查找+操作”DSL，类似封装好的查询构造器。

  【运行方式】浏览器打开本文件即可。
-->
<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.staticfile.org/jquery/1.8.3/jquery.min.js">
</script>
<script>
    function myFunction()  // 函数声明（会提升 hoisting）
{
    $("#h01").attr("style","color:red").html("Hello jQuery")  // jQuery 选择器/调用（$ 是 jQuery 的入口函数）
}
    $(document).ready(myFunction);  // jQuery 选择器/调用（$ 是 jQuery 的入口函数）
</script>
</head>
<body>
<h1 id="h01"></h1>
</body>
</html>
