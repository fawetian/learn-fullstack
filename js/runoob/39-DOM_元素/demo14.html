<!--
  ============================================================
  【第 39 节 · DOM 元素】demo14.html
  ============================================================

  【知识点 / 后端类比】
  createElement/createTextNode/appendChild/removeChild 动态增删 DOM 节点。
  后端类比：≈ 对数据结构树做增删改查(CRUD)，这里操作的是页面节点树。

  【运行方式】浏览器打开本文件即可。
-->
<div id="div1">
<p id="p1">这是一个段落。</p>
<p id="p2">这是另外一个段落。</p>
</div>
<script>
    var para = document.createElement("p");  // 创建一个新的 DOM 元素节点（还没插入页面）
    var node = document.createTextNode("这是一个新的段落。");  // 创建文本节点
    para.appendChild(node);  // 把节点追加为子元素（插入 DOM 树）
 
    var parent = document.getElementById("div1");  // 按 id 查找 DOM 元素（id≈主键），返回该节点
    var child = document.getElementById("p1");  // 按 id 查找 DOM 元素（id≈主键），返回该节点
parent.replaceChild(para, child);
</script>
