<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>React Electron Notes</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 700px; margin: 0 auto; }
  button { padding: 10px 20px; cursor: pointer; font-size: 16px; }
  ul { list-style: none; padding: 0; }
  li { background: #f5f7fa; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {
    const [notes, setNotes] = useState([]);

    useEffect(() => {
      window.electronAPI.getNotes().then(setNotes);
      window.electronAPI.onUpdateNotes((_event, newNotes) => setNotes(newNotes));
    }, []);

    const openNoteWindow = () => {
      window.open('note.html', '新建笔记', 'width=400,height=300');
    };

    return (
      <div>
        <h1>我的笔记 (React)</h1>
        <button onClick={openNoteWindow}>新建笔记</button>
        <ul>
          {notes.map((n, i) => (
            <li key={i}>{n}</li>
          ))}
        </ul>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
