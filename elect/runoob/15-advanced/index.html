<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>高级应用</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 16px; }
    #output { border: 1px solid #ccc; padding: 15px; margin-top: 20px; min-height: 150px; white-space: pre-wrap; background: #f9f9f9; border-radius: 4px; }
    .section { margin-bottom: 20px; padding: 15px; background: #f5f7fa; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Electron 高级应用</h1>
  
  <div class="section">
    <h3>自定义协议</h3>
    <p>已注册 myapp:// 协议（打包安装后生效）</p>
    <button id="protocolBtn">获取当前协议 URL</button>
  </div>
  
  <div class="section">
    <h3>多窗口广播</h3>
    <p>先点"打开新窗口"开多个窗口，再在任意窗口广播，其他窗口会收到消息</p>
    <button id="newWinBtn">打开新窗口</button>
    <input id="msg" placeholder="广播消息" style="width:200px;padding:5px;">
    <button id="broadcastBtn">广播</button>
  </div>
  
  <div class="section">
    <h3>窗口状态</h3>
    <p>窗口关闭时自动保存大小和位置到 window-state.json</p>
  </div>
  
  <div id="output"></div>
  
  <script>
    const output = document.getElementById('output');
    
    document.getElementById('protocolBtn').addEventListener('click', async () => {
      const url = await window.advancedAPI.getProtocolUrl();
      output.textContent = '协议 URL: ' + url;
    });
    
    document.getElementById('newWinBtn').addEventListener('click', async () => {
      const res = await window.advancedAPI.createWindow();
      output.textContent = res;
    });

    document.getElementById('broadcastBtn').addEventListener('click', async () => {
      const msg = document.getElementById('msg').value || 'Hello!';
      const res = await window.advancedAPI.broadcast(msg);
      output.textContent = res;
    });
    
    // 监听广播消息
    window.advancedAPI.onBroadcast((message) => {
      output.textContent = '【收到广播】' + message + '\n' + output.textContent;
    });
  </script>
</body>
</html>
