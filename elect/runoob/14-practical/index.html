<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>综合实战项目</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 16px; }
    #output { border: 1px solid #ccc; padding: 15px; margin-top: 20px; min-height: 150px; white-space: pre-wrap; background: #f9f9f9; border-radius: 4px; }
    .section { margin-bottom: 20px; padding: 15px; background: #f5f7fa; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Electron 综合实战项目</h1>
  
  <div class="section">
    <h3>多窗口</h3>
    <button id="newWin">打开新窗口</button>
  </div>
  
  <div class="section">
    <h3>文件操作</h3>
    <button id="selectFile">选择并读取文件</button>
  </div>
  
  <div class="section">
    <h3>通知</h3>
    <button id="notify">发送通知</button>
  </div>
  
  <div class="section">
    <h3>Shell 操作</h3>
    <button id="openExternal">打开外部链接</button>
    <button id="showInFolder">在文件夹中显示</button>
  </div>
  
  <div id="output"></div>
  
  <script>
    const output = document.getElementById('output');
    
    document.getElementById('newWin').addEventListener('click', async () => {
      const res = await window.practicalAPI.createNewWindow();
      output.textContent = res;
    });
    
    document.getElementById('selectFile').addEventListener('click', async () => {
      const res = await window.practicalAPI.selectAndReadFile();
      if (res.canceled) { output.textContent = '取消选择'; return; }
      output.textContent = '文件: ' + res.filePath + '

内容前 200 字:
' + res.content.substring(0, 200);
    });
    
    document.getElementById('notify').addEventListener('click', async () => {
      const ok = await window.practicalAPI.showNotification('Electron 通知', '这是一个系统通知演示！');
      output.textContent = ok ? '通知已发送' : '通知不支持';
    });
    
    document.getElementById('openExternal').addEventListener('click', async () => {
      await window.practicalAPI.openExternal('https://www.electronjs.org');
      output.textContent = '已在浏览器中打开 electronjs.org';
    });
    
    document.getElementById('showInFolder').addEventListener('click', async () => {
      // 假设打开主进程文件所在目录
      await window.practicalAPI.showInFolder('.');
      output.textContent = '已在文件管理器中显示';
    });
  </script>
</body>
</html>
