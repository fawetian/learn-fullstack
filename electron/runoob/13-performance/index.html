<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>性能优化</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #mem { background: #f5f7fa; padding: 20px; border-radius: 8px; margin-top: 20px; font-family: monospace; }
    button { padding: 10px 20px; cursor: pointer; margin: 5px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>Electron 性能优化演示</h1>
  <p>特性：延迟显示(show:false) | 单实例锁 | 后台节流关闭</p>
  
  <button id="memBtn">查看内存使用</button>
  <button id="lazyBtn">懒加载模块</button>
  
  <div id="mem"></div>
  
  <script>
    document.getElementById('memBtn').addEventListener('click', () => {
      const mem = window.perfAPI.memory();
      document.getElementById('mem').innerHTML = '<pre>' + JSON.stringify(mem, null, 2) + '</pre>';
    });
    
    document.getElementById('lazyBtn').addEventListener('click', async () => {
      // 模拟懒加载：延迟 500ms 后"加载"模块
      const module = await new Promise(r => setTimeout(() => r({ init: () => '模块已加载' }), 500));
      document.getElementById('mem').textContent = module.init();
    });
  </script>
</body>
</html>
